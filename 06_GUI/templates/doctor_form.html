{% extends "base.html" %}
{% block title %}Add Doctor{% endblock %}
{% block page_title %}➕ Add Doctor{% endblock %}
{% block content %}
<div class="card" style="max-width:760px">
  <div class="card-header">
    <h2>Doctor Registration</h2>
    <a href="{{ url_for('doctors') }}" class="btn btn-ghost btn-sm">← Back</a>
  </div>
  {% if error %}<div class="alert alert-danger">⚠ {{ error }}</div>{% endif %}

  <form method="POST" id="docForm" novalidate>
    <p class="text-muted mb-2" style="font-size:13px">
      ℹ A Staff record will be automatically created for this doctor.
    </p>
    <div class="form-grid">
      <div class="form-group">
        <label>First Name *</label>
        <input name="first_name" type="text" required placeholder="First name">
      </div>
      <div class="form-group">
        <label>Last Name *</label>
        <input name="last_name" type="text" required placeholder="Last name">
      </div>
      <div class="form-group">
        <label>Department *</label>
        <select name="dept_id" required>
          <option value="">— Select Department —</option>
          {% for d in depts %}
          <option value="{{ d.dept_id }}">{{ d.dept_name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Specialization *</label>
        <input name="specialization" type="text" required placeholder="e.g. Cardiology">
      </div>
      <div class="form-group">
        <label>License Number *</label>
        <input name="license_number" type="text" required placeholder="PMDC-YYYY-XXX">
      </div>
      <div class="form-group">
        <label>Consultation Fee (PKR) *</label>
        <input name="consultation_fee" type="number" min="1" step="100" required placeholder="e.g. 2500">
      </div>
      <div class="form-group">
        <label>Phone *</label>
        <input name="phone" type="tel" required placeholder="03XXXXXXXXX">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input name="email" type="email" placeholder="doctor@hms.pk">
      </div>
      <div class="form-group">
        <label>Hire Date *</label>
        <input name="hire_date" type="date" required>
      </div>
      <div class="form-group">
        <label>Monthly Salary (PKR) *</label>
        <input name="salary" type="number" min="1" required placeholder="e.g. 200000">
      </div>
      <div class="form-group">
        <label>Shift *</label>
        <select name="shift" required>
          <option value="">— Select Shift —</option>
          <option value="Morning">Morning</option>
          <option value="Evening">Evening</option>
          <option value="Night">Night</option>
        </select>
      </div>
      <div class="form-group">
        <label>Available Days *</label>
        <input name="available_days" type="text" required placeholder="e.g. Mon,Tue,Wed,Thu">
      </div>
    </div>
    <div class="mt-3" style="display:flex;gap:10px">
      <button type="submit" class="btn btn-primary">➕ Register Doctor</button>
      <a href="{{ url_for('doctors') }}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
