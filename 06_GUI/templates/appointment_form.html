{% extends "base.html" %}
{% block title %}Schedule Appointment{% endblock %}
{% block page_title %}<i class="fa-solid fa-calendar-check fa-lg icon-primary"></i> Schedule Appointment{% endblock %}
{% block content %}
<div class="card" style="max-width:680px">
  <div class="card-header">
    <h2>New Appointment</h2>
    <a href="{{ url_for('appointments') }}" class="btn btn-ghost btn-sm"><i class="fa-solid fa-arrow-left fa-sm"></i> Back</a>
  </div>
  {% if error %}<div class="alert alert-danger"><i class="fa-solid fa-triangle-exclamation fa-sm"></i> {{ error }}</div>{% endif %}

  <form method="POST" id="aptForm" novalidate>
    <div class="form-grid">
      <div class="form-group">
        <label for="patient_id">Patient *</label>
        <select id="patient_id" name="patient_id" required>
          <option value="">— Select Patient —</option>
          {% for p in patients %}
          <option value="{{ p.patient_id }}"
            {% if appointment and appointment.patient_id==p.patient_id %}selected{% endif %}>
            #{{ p.patient_id }} – {{ p.name }}
          </option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label for="doctor_id">Doctor *</label>
        <select id="doctor_id" name="doctor_id" required>
          <option value="">— Select Doctor —</option>
          {% for d in doctors %}
          <option value="{{ d.doctor_id }}"
            {% if appointment and appointment.doctor_id==d.doctor_id %}selected{% endif %}>
            Dr. {{ d.name }} ({{ d.specialization }})
          </option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label for="apt_date">Appointment Date *</label>
        <input id="apt_date" name="apt_date" type="date" required
               min="{{ today }}"
               value="{{ appointment.appointment_date if appointment else '' }}">
      </div>
      <div class="form-group">
        <label for="apt_time">Appointment Time *</label>
        <input id="apt_time" name="apt_time" type="time" required
               value="{{ appointment.appointment_time if appointment else '09:00' }}">
      </div>
      <div class="form-group full">
        <label for="reason">Reason for Visit *</label>
        <textarea id="reason" name="reason" required
                  placeholder="Describe reason for the appointment…">{{ appointment.reason if appointment else '' }}</textarea>
      </div>
    </div>
    <div class="mt-3" style="display:flex;gap:10px">
      <button type="submit" class="btn btn-primary"><i class="fa-solid fa-plus fa-sm"></i> Schedule Appointment</button>
      <a href="{{ url_for('appointments') }}" class="btn btn-ghost"><i class="fa-solid fa-xmark fa-sm"></i> Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
{% block scripts %}
<script>
document.getElementById('aptForm').addEventListener('submit', e => {
  const fields = ['patient_id','doctor_id','apt_date','apt_time','reason'];
  let ok = true;
  fields.forEach(id => {
    const el = document.getElementById(id);
    if (!el.value.trim()) { el.style.borderColor='var(--danger)'; ok=false; }
    else el.style.borderColor='';
  });
  if (!ok) e.preventDefault();
});
</script>
{% endblock %}
