<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Signup – ClinicFlow</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body style="display:grid;place-items:center;padding:24px;">
<section class="card fade-in" style="width:min(1100px,100%);padding:0;overflow:hidden;">
  <div class="kpi-grid" style="margin:0;">
    <div class="hero-section" style="grid-column: span 7; margin:0; border-radius:0;">
      <div class="hero-orb"></div>
      <h1 class="hero-title">Create your ClinicFlow account</h1>
      <p class="hero-subtitle">Join a role-based clinical workspace built for secure patient care and smooth daily operations.</p>
      <div class="stats-bar" style="margin-bottom:0;">
        <div><div class="stat-value">99.9%</div><div class="stat-label">Uptime target</div></div>
        <div><div class="stat-value">24/7</div><div class="stat-label">Staff support</div></div>
        <div><div class="stat-value">3</div><div class="stat-label">Core modules</div></div>
        <div><div class="stat-value">1</div><div class="stat-label">Unified system</div></div>
      </div>
    </div>
    <div class="card" style="grid-column: span 5; margin:20px;">
      <div class="card-header"><h2>Sign Up</h2></div>
      {% if error %}
      <div class="alert alert-danger">{{ error }}</div>
      {% endif %}
      <form method="POST" id="signupForm" class="form-grid">
        <div class="form-group full">
          <label>Select Role</label>
          <select name="role" id="roleInput" required>
            <option value="">Choose role</option>
            <option value="Doctor">Doctor</option>
            <option value="Staff">Staff</option>
          </select>
        </div>
        <div class="form-group full">
          <label>Full Name</label>
          <input type="text" name="name" required>
        </div>
        <div class="form-group full">
          <label>Email</label>
          <input type="email" name="email" required>
        </div>
        <div class="form-group full">
          <label>Password</label>
          <input type="password" name="password" required>
        </div>
        <div class="form-group full">
          <label>Confirm Password</label>
          <input type="password" name="confirm" required>
        </div>
        <button type="submit" id="submitBtn" class="btn btn-primary" style="width:min(240px,100%);justify-self:center;">Create Account</button>
      </form>
      <a href="{{ url_for('login') }}" class="btn btn-ghost w-full mt-2">Already have an account?</a>
    </div>
  </div>
</section>

<script>
document.getElementById('signupForm').addEventListener('submit', (e) => {
  const role = document.getElementById('roleInput').value;
  if (!role) {
    e.preventDefault();
  }
});
</script>

</body>
</html>
