{% extends "base.html" %}
{% block title %}New Prescription{% endblock %}
{% block page_title %}<i class="fa-solid fa-file-prescription fa-lg icon-primary"></i> New Prescription{% endblock %}
{% block content %}
<div class="card" style="max-width:760px;">
  <div class="card-header">
    <h2>Create Prescription</h2>
    <a href="{{ url_for('doctor_prescriptions') }}" class="btn btn-ghost btn-sm"><i class="fa-solid fa-arrow-left fa-sm"></i> Back</a>
  </div>
  {% if error %}
  <div class="alert alert-danger"><i class="fa-solid fa-triangle-exclamation fa-sm"></i> {{ error }}</div>
  {% endif %}
  <form method="POST" class="form-grid">
    <div class="form-group full">
      <label>Patient *</label>
      <select name="patient_id" required>
        <option value="">-- Select Patient --</option>
        {% for p in patients %}
        <option value="{{ p.patient_id }}">#{{ p.patient_id }} - {{ p.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group full">
      <label>Diagnosis *</label>
      <input type="text" name="diagnosis" placeholder="Primary diagnosis" required>
    </div>
    <div class="form-group full">
      <label>Notes</label>
      <textarea name="notes" placeholder="Additional treatment notes"></textarea>
    </div>
    <button type="submit" class="btn btn-primary"><i class="fa-solid fa-floppy-disk fa-sm"></i> Save & Continue</button>
  </form>
</div>
{% endblock %}
