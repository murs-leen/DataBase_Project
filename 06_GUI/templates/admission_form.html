{% extends "base.html" %}
{% block title %}Admit Patient{% endblock %}
{% block page_title %}🛏️ Admit Patient{% endblock %}
{% block content %}
<div class="card" style="max-width:680px">
  <div class="card-header">
    <h2>New Admission</h2>
    <a href="{{ url_for('admissions') }}" class="btn btn-ghost btn-sm">← Back</a>
  </div>
  {% if error %}<div class="alert alert-danger">⚠ {{ error }}</div>{% endif %}

  <form method="POST" id="admForm" novalidate>
    <div class="form-grid">
      <div class="form-group">
        <label>Patient *</label>
        <select name="patient_id" id="patient_id" required>
          <option value="">— Select Patient —</option>
          {% for p in patients %}
          <option value="{{ p.patient_id }}">#{{ p.patient_id }} – {{ p.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Attending Doctor *</label>
        <select name="doctor_id" id="doctor_id" required>
          <option value="">— Select Doctor —</option>
          {% for d in doctors %}
          <option value="{{ d.doctor_id }}">Dr. {{ d.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group full">
        <label>Available Room *</label>
        <select name="room_id" id="room_id" required>
          <option value="">— Select Room —</option>
          {% for r in rooms %}
          <option value="{{ r.room_id }}">
            {{ r.room_number }} – {{ r.room_type }} (PKR {{ "{:,.0f}".format(r.daily_charge) }}/day)
          </option>
          {% endfor %}
        </select>
        <span class="text-muted">Only available rooms are listed</span>
      </div>
      <div class="form-group full">
        <label>Initial Diagnosis *</label>
        <textarea name="diagnosis" id="diagnosis" required
                  placeholder="Enter the primary diagnosis…"></textarea>
      </div>
    </div>
    <div class="mt-3" style="display:flex;gap:10px">
      <button type="submit" class="btn btn-primary">🛏️ Admit Patient</button>
      <a href="{{ url_for('admissions') }}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
{% block scripts %}
<script>
document.getElementById('admForm').addEventListener('submit', e => {
  ['patient_id','doctor_id','room_id','diagnosis'].forEach(id => {
    const el = document.getElementById(id);
    if (!el.value.trim()) el.style.borderColor='var(--danger)';
    else el.style.borderColor='';
  });
});
</script>
{% endblock %}
